<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Guerreiro do Eclipse</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
<h1>⚔ GUERREIRO DO ECLIPSE ⚔</h1>
<p>Anime Interativo</p>

<button onclick="continuar()">Continuar</button>
<button onclick="novo()">Novo Jogo</button>

</div>

<script>
function continuar(){
let ep = localStorage.getItem("epAtual") || 0;
window.location.href="episodio.html?ep="+ep;
}

function novo(){
localStorage.setItem("epAtual",0);
window.location.href="episodio.html?ep=0";
}
</script>

</body>
</html>
